<form class="p-6 space-y-5">
    <div class="space-y-2">
        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Organization Name</label>
        <input
            class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-2.5 px-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none"
            placeholder="e.g. Acme Corp" type="text" />
    </div>
    <div class="space-y-2">
        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Admin Email</label>
        <input
            class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-2.5 px-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none"
            placeholder="admin@example.com" type="email" />
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Subscription
                Plan</label>
            <div class="relative">
                <select
                    class="w-full appearance-none bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-2.5 pl-4 pr-10 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                    <option>Basic</option>
                    <option>Pro</option>
                    <option>Enterprise</option>
                </select>
                <span
                    class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 material-symbols-outlined">expand_more</span>
            </div>
        </div>
        <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Initial Status</label>
            <div class="relative">
                <select
                    class="w-full appearance-none bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-2.5 pl-4 pr-10 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                    <option>Active</option>
                    <option>Pending</option>
                    <option>Inactive</option>
                </select>
                <span
                    class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 material-symbols-outlined">expand_more</span>
            </div>
        </div>
    </div>
    <div class="pt-4 flex items-center justify-end gap-3">
        <button
            class="px-6 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
            type="button">Cancel</button>
        <button
            class="px-6 py-2.5 rounded-lg bg-primary hover:bg-primary/90 text-white text-sm font-bold shadow-md transition-all active:scale-95"
            type="submit">Create Organization</button>
    </div>
</form>
