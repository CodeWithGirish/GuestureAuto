<!DOCTYPE html>

<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Create Gesture Mapping - Hand Gesture Automation</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#1a227f",
            "background-light": "#f6f6f8",
            "background-dark": "#121320",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100">
  <!-- Top Navigation Bar -->
  <header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center h-16 gap-8">
        <!-- Logo Section -->
        <div class="flex items-center gap-3">
          <div class="bg-primary p-1.5 rounded-lg text-white">
            <span class="material-symbols-outlined block">back_hand</span>
          </div>
          <h1 class="text-lg font-bold tracking-tight text-primary">GuestureAuto<span
              class="text-slate-500 font-normal"></span></h1>
        </div>
        <!-- Desktop Navigation Links -->
        <nav class="hidden md:flex space-x-8">
          <a class="text-slate-500 hover:text-primary dark:hover:text-white px-1 py-2 text-sm font-medium transition-colors"
            href="..\1_Dashboard and Profile\User Dashboard Screen.html">Dashboard</a>
          <a class="text-slate-500 hover:text-primary dark:hover:text-white px-1 py-2 text-sm font-medium transition-colors"
            href="..\3_Action Mapping\1_Action Mapping Screen.html">Mapped Actions</a>
          <a class="text-primary dark:text-white border-b-2 border-primary px-1 py-2 text-sm font-semibold"
            href="#">Create Mapping</a>
        </nav>
      </div>
    </div>
  </header>
  <!-- Main Content Grid -->
  <main class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-30">
    <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h2 class="text-3xl font-black text-primary dark:text-white tracking-tight">Gesture Mapping</h2>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Set the Actions on Scanned Gestures.</p>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Left Side: Gesture Selection (5/12) -->
      <section class="lg:col-span-5 flex flex-col gap-6">
        <div
          class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden flex flex-col h-full">
          <div class="p-6 border-b border-slate-300 dark:border-slate-800 flex justify-between items-center">
            <h3 class="text-lg font-bold">1. Select Gesture</h3>
          </div>
          <div class="p-6 flex-1 flex flex-col">
            <div class="relative mb-6">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
              <input id="gesture-search"
                class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-sm"
                placeholder="Search gestures..." type="text" />
            </div>

            <div id="gesture-selection-grid"
              class="grid grid-cols-2 gap-4 max-h-[500px] overflow-y-auto custom-scrollbar pr-2">
            </div>

            <template id="gesture-loading-template">
              <div class="col-span-full py-10 text-center text-slate-500">Loading gestures from library...</div>
            </template>

            <template id="gesture-empty-template">
              <div
                class="col-span-full border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl p-8 text-center text-slate-500">
                <span class="material-symbols-outlined text-4xl mb-2">waving_hand</span>
                <p class="font-bold text-slate-700 dark:text-slate-300">No Gestures Found</p>
                <p class="text-sm mt-1">Please scan and save a gesture in the Gesture Module first.</p>
              </div>
            </template>

            <template id="gesture-selection-template">
              <label class="relative group cursor-pointer">
                <input class="peer hidden gesture-radio" name="gesture" type="radio" value="" />
                <div
                  class="p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all peer-checked:border-primary peer-checked:bg-primary/5 hover:border-slate-300 dark:hover:border-slate-700 flex flex-col items-center text-center gap-3">
                  <div
                    class="h-16 w-16 bg-slate-50 dark:bg-slate-800 rounded-lg flex items-center justify-center overflow-hidden text-slate-600 dark:text-slate-300 group-hover:scale-105 transition-transform">
                    <img class="gesture-img w-full h-full object-cover hidden" src="" alt="Gesture Thumbnail" />
                    <span class="gesture-icon material-symbols-outlined text-4xl">front_hand</span>
                  </div>
                  <div>
                    <p class="gesture-name font-bold text-sm text-slate-900 dark:text-white"></p>
                    <p class="gesture-count text-xs text-slate-500"></p>
                  </div>
                  <div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
                    <span class="material-symbols-outlined text-xl">check_circle</span>
                  </div>
                </div>
              </label>
            </template>
          </div>
        </div>
      </section>
      <!-- Right Side: Action Configuration (7/12) -->
      <section class="lg:col-span-7">
        <div
          class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col">

          <div class="p-6 border-b border-slate-300 dark:border-slate-800 flex justify-between items-center">
            <h3 class="text-lg font-bold">2. Select Actions</h3>
          </div>
          
          <div class="p-4 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 dark:text-slate-300">System Specific</label>
                <div class="relative">
                  <select id="system-category-select"
                    class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-2.5 px-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none">
                    <option value="">Select System action</option>
                    <option value="Mouse Control">Mouse Control</option>
                    <option value="Media Control">Media Control</option>
                    <option value="Scrolling And Navigation">Scrolling And Navigation</option>
                    <option value="Keyboard Shortcuts">Keyboard Shortcuts</option>
                    <option value="Application Control">Application Control</option>
                    <option value="Screenshot & Screen Recording">Screenshot & Screen Recording</option>
                    <option value="System Controls">System Controls</option>
                  </select>
                </div>
              </div>
              <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Action Type</label>
                <div class="relative">
                  <select id="system-action-select" disabled
                    class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-2.5 px-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none disabled:opacity-50 disabled:cursor-not-allowed">
                    <option value="">Select Action Type</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="text-center"> OR </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Target Application</label>
                <div class="relative">
                  <select id="target-app-select"
                    class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-2.5 px-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none">
                    <option value="Global">Select an Application</option>
                  </select>
                </div>
              </div>
              <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Action Type</label>
                <div class="relative">
                  <select id="target-action-select"
                    class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-2.5 px-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none">
                    <option>Keyboard Shortcut</option>
                    <option>System Command</option>
                    <option>Media Control</option>
                    <option>Macro Chain</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="space-y-3">

              <!-- Delay Slider -->
              <div class="space-y-4">
                <div class="flex justify-between items-center">
                  <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Detection Delay</label>
                  <span id="detection-delay-display"
                    class="text-sm font-bold text-primary bg-primary/10 px-2 py-0.5 rounded">250ms</span>
                </div>
                <input id="detection-delay-slider"
                  class="w-full h-1.5 bg-slate-200 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer accent-primary"
                  type="range" min="0" max="1000" step="50" value="250" />
                <div class="flex justify-between text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                  <span>Instant</span>
                  <span>Balanced</span>
                  <span>Intentional</span>
                </div>
              </div>
              <div class="flex gap-4 w-full md:w-auto">
                <button
                  class="flex-1 md:flex-none px-6 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 font-bold text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
                  <span class="material-symbols-outlined text-xl">play_circle</span>
                  Test Trigger
                </button>
                <button id="save-mapping-btn"
                  class="flex-1 md:flex-none px-8 py-2.5 rounded-lg bg-primary text-white font-bold text-sm hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                  <span class="material-symbols-outlined text-xl">save</span>
                  Save Mapping
                </button>
              </div>
            </div>
          </div>
      </section>
    </div>
    <script src="action_mapping_logic.js"></script>
</body>
</main>
</body>

</html>
