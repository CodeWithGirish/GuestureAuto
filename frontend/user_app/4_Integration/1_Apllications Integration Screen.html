<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Integrations - Hand Gesture Automation</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a227f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121320",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Top Navbar -->
            <header
                class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex items-center h-16 gap-8">
                        <!-- Logo Section -->
                        <div class="flex items-center gap-3">
                            <div class="bg-primary p-1.5 rounded-lg text-white">
                                <span class="material-symbols-outlined block">back_hand</span>
                            </div>
                            <h1 class="text-lg font-bold tracking-tight text-primary">GuestureAuto<span
                                    class="text-slate-500 font-normal"></span></h1>
                        </div>
                        <!-- Desktop Navigation Links -->
                        <nav class="hidden md:flex space-x-8">
                            <a class="text-slate-500 hover:text-primary dark:hover:text-white px-1 py-2 text-sm font-medium transition-colors"
                                href="..\1_Dashboard and Profile\User Dashboard Screen.html">Dashboard</a>
                            <a class="text-primary dark:text-white border-b-2 border-primary px-1 py-2 text-sm font-semibold"
                                href="#">Connected Apps</a>
                            <a class="text-slate-500 hover:text-primary dark:hover:text-white px-1 py-2 text-sm font-medium transition-colors"
                                href="..\4_Integration\2_Add Application Screen.html">Add Application</a>
                        </nav>

                    </div>
                </div>
            </header>
<main class="flex flex-1 justify-center py-8">
                <div class="layout-content-container flex flex-col max-w-[1200px] flex-1 px-4 md:px-10">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-8">
                        <div class="flex flex-col gap-1">
                            <h1 class="text-slate-900 dark:text-white text-3xl font-black leading-tight tracking-tight">Integrations</h1>
                            <p class="text-slate-500 dark:text-slate-400 text-base max-w-xl">Configure how your hand gestures bridge the gap between human movement and software actions.</p>
                        </div>
                        <button onclick="window.location.href='2_Add Application Screen.html'" class="bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-lg font-bold text-sm transition-all shadow-lg shadow-primary/20 flex items-center gap-2">
                            <span class="material-symbols-outlined text-lg">add</span>
                            New Integration
                        </button>
                    </div>

                    <div class="flex flex-col sm:flex-row items-center gap-4 mb-6">
                        <div class="relative w-full sm:max-w-xs">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
                            <input class="w-full pl-10 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-sm focus:ring-primary focus:border-primary" placeholder="Search connected apps..." type="text" />
                        </div>
                    </div>

                    <div id="connected-apps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        </div>

                    <template id="loading-template">
                        <div class="col-span-full py-10 text-center text-slate-500">Loading connected integrations...</div>
                    </template>

                    <template id="empty-state-template">
                        <div class="col-span-full border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl p-10 flex flex-col items-center justify-center text-center cursor-pointer hover:border-primary/50 transition-all" onclick="window.location.href='2_Add Application Screen.html'">
                            <div class="size-16 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4 text-slate-400">
                                <span class="material-symbols-outlined text-3xl">add</span>
                            </div>
                            <h3 class="text-slate-900 dark:text-white text-lg font-bold mb-1">No Integrations Yet</h3>
                            <p class="text-slate-500 dark:text-slate-400 text-sm">Click here to scan your system and connect your first application.</p>
                        </div>
                    </template>

                    <template id="connected-app-card-template">
                        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 hover:shadow-xl transition-all group border-l-4 border-l-primary">
                            <div class="flex justify-between items-start mb-4">
                                <div class="size-14 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center overflow-hidden shadow-inner text-primary">
                                    <span class="app-icon material-symbols-outlined text-3xl">widgets</span>
                                </div>
                                <div class="flex items-center gap-1.5 bg-green-50 dark:bg-green-500/10 px-2 py-1 rounded-full">
                                    <span class="size-2 bg-green-500 rounded-full animate-pulse"></span>
                                    <span class="text-[10px] font-bold text-green-700 dark:text-green-400 uppercase tracking-wider">Active</span>
                                </div>
                            </div>
                            <h3 class="app-name text-slate-900 dark:text-white text-lg font-bold mb-1">App Name</h3>
                            <p class="app-version text-slate-500 dark:text-slate-400 text-xs mb-4">Version Info</p>
                            
                            <div class="space-y-3 mb-6">
                                <div class="flex items-center gap-2 text-xs text-slate-600 dark:text-slate-400">
                                    <span class="material-symbols-outlined text-sm text-primary">account_tree</span>
                                    <span class="app-mappings">0 Active Mappings</span>
                                </div>
                            </div>
                            
                            <div class="flex gap-2">
                                <button class="configure-btn flex-1 bg-primary text-white py-2 rounded-lg font-semibold text-sm hover:bg-primary/90 transition-colors">Configure Actions</button>
                                <button class="disconnect-btn px-3 py-2 border border-slate-200 dark:border-slate-800 rounded-lg hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors" title="Disconnect App">
                                    <span class="material-symbols-outlined text-lg">delete</span>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </main>

            <script src="integration_logic.js"></script>
        </div>
    </div>
</body>

</html>
