<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gesture Module - My Gestures</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a227f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121320",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100">
    <!-- Top Navigation Bar -->
    <header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center h-16 gap-8">
                <!-- Logo Section -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
                        <span class="material-symbols-outlined">gesture</span>
                    </div>
                    <span class="text-xl font-bold text-primary dark:text-white tracking-tight">GestureAuto</span>
                </div>
                <!-- Desktop Navigation Links -->
                <nav class="hidden md:flex space-x-8">
                    <a class="text-slate-500 hover:text-primary dark:hover:text-white px-1 py-2 text-sm font-medium transition-colors"
                        href="..\1_Dashboard and Profile\User Dashboard Screen.html">Dashboard</a>
                    <a class="text-primary dark:text-white border-b-2 border-primary px-1 py-2 text-sm font-semibold"
                        href="">My Gestures</a>
                    <a class="text-slate-500 hover:text-primary dark:hover:text-white px-1 py-2 text-sm font-medium transition-colors"
                        href="..\2_Gusture Module\2_Guesture Scan Screen.html">Sample Scan</a>
                </nav>
            </div>
        </div>
    </header>
    <!-- Sub-navigation / Breadcrumbs -->
    <div class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
        <div
            class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Saved Gestures</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Manage and optimize your custom hand gesture
                    library.</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                    <input
                        class="pl-9 pr-4 py-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent text-sm w-full md:w-64"
                        placeholder="Search gestures..." type="text" />
                </div>
                <button
                    class="flex items-center justify-center p-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 hover:bg-slate-50 transition-colors">
                    <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">filter_list</span>
                </button>
            </div>
        </div>
    </div>
    <!-- Dialog Box Code -->
    <div id="image-view-modal"
        class="fixed inset-0 z-[100] bg-[#1e0f24]/70 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div
            class="bg-white w-full max-w-4xl rounded-xl shadow-2xl flex flex-col max-h-[870px] h-[90vh] overflow-hidden">
            <header class="flex items-center justify-between border-b border-slate-200 bg-[#1e0f24] px-6 py-4">
                <div class="flex items-center gap-4 text-white">
                    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-[#40204b]">
                        <span class="material-symbols-outlined text-white" data-icon="pan_tool">pan_tool</span>
                    </div>
                    <h2 id="modal-title" class="text-white text-lg font-bold leading-tight tracking-tight">Gesture
                        Samples</h2>
                </div>
                <div class="flex items-center gap-3">
                    <button id="select-all-btn" onclick="selectAllModalImages(this)"
                        class="flex items-center justify-center rounded-lg h-10 px-4 border border-slate-500 text-white text-sm font-bold hover:bg-white/10 transition-colors">
                        <span class="truncate">Select All</span>
                    </button>
                    <button onclick="deleteSelectedModalImages()"
                        class="flex items-center justify-center rounded-lg h-10 px-4 bg-red-600 text-white text-sm font-bold hover:bg-red-700 transition-colors">
                        <span class="truncate">Delete Selected</span>
                    </button>
                    <button onclick="closeImageViewModal()"
                        class="flex items-center justify-center rounded-lg h-10 w-10 bg-white/10 text-white hover:bg-white/20 transition-colors">
                        <span class="material-symbols-outlined" data-icon="close">close</span>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-6 bg-background-light custom-scrollbar">
                <div id="modal-images-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                </div>
            </div>

            <footer class="p-4 border-t border-slate-200 flex justify-between items-center bg-white">
                <div id="modal-footer-text" class="text-sm text-slate-500">Showing 0 samples</div>
                <div class="flex gap-3">
                    <button onclick="closeImageViewModal()"
                        class="px-6 py-2 rounded-lg bg-slate-100 text-slate-700 font-bold text-sm hover:bg-slate-200 transition-colors">
                        Cancel
                    </button>
                    <button onclick="closeImageViewModal()"
                        class="px-6 py-2 rounded-lg bg-[#1e0f24] text-white font-bold text-sm hover:bg-[#40204b] transition-colors">
                        Close
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <template id="modal-image-template">
        <div class="group relative flex flex-col gap-2">
            <div
                class="relative w-full aspect-square bg-white rounded-xl overflow-hidden border-2 border-transparent hover:border-primary shadow-sm">
                <img class="modal-img w-full h-full object-cover" src="" />
                <div class="absolute top-2 right-2">
                    <input class="modal-checkbox h-5 w-5 rounded border-slate-300 text-primary focus:ring-primary"
                        type="checkbox" />
                </div>
            </div>
            <span class="modal-filename text-xs text-slate-500 text-center"></span>
        </div>
    </template>
    <!-- Main Content Area -->
    <main class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-32">

        <div id="gestures-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>

        <template id="gesture-card-template">
            <div
                class="group bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 border border-slate-200 dark:border-slate-800">
                <div
                    class="view-trigger cursor-pointer relative aspect-video overflow-hidden bg-slate-100 dark:bg-slate-800">
                    <img alt=""
                        class="gesture-img w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                        src="" />
                </div>
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="gesture-name font-bold text-slate-900 dark:text-white text-lg leading-none"></h3>
                        <div
                            class="flex items-center text-primary font-semibold text-xs bg-primary/10 px-2 py-1 rounded">
                            <span class="material-symbols-outlined text-sm mr-1">photo_library</span>
                            <span class="gesture-count"></span>
                        </div>
                    </div>
                    <p class="gesture-desc text-sm text-slate-500 dark:text-slate-400 mb-4 line-clamp-1"></p>
                    <div class="flex items-center justify-between border-t border-slate-100 dark:border-slate-800 pt-3">
                        <span class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Ready for
                            mapping</span>
                        <div class="flex gap-2">
                            <button
                                class="edit-btn p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-400 transition-colors">
                                <span class="material-symbols-outlined text-xl">edit</span>
                            </button>
                            <button
                                class="delete-btn p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-slate-600 dark:text-slate-400 hover:text-red-600 transition-colors">
                                <span class="material-symbols-outlined text-xl">delete</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <template id="add-new-card-template">
            <div onclick="window.location.href='2_Guesture Scan Screen.html'"
                class="border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl flex flex-col items-center justify-center p-8 bg-slate-50/50 dark:bg-slate-800/20 hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors cursor-pointer group min-h-[250px]">
                <div
                    class="w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-400 group-hover:text-primary transition-colors mb-4">
                    <span class="material-symbols-outlined text-3xl">add</span>
                </div>
                <p class="text-slate-600 dark:text-slate-300 font-semibold">New Training Sample</p>
                <p class="text-xs text-slate-400 text-center mt-2">Click to start capturing a new gesture pattern</p>
            </div>
        </template>

    </main>
    <!-- Floating Action Button (FAB) -->
    <div class="fixed bottom-8 right-8 z-[60]">
        <button onclick="window.location.href='2_Guesture Scan Screen.html'"
            class="group flex items-center gap-3 bg-primary text-white pl-4 pr-6 py-4 rounded-full shadow-lg shadow-primary/30 hover:shadow-xl hover:scale-105 transition-all duration-300 active:scale-95">
            <span class="material-symbols-outlined text-2xl">add_a_photo</span>
            <span class="font-bold tracking-wide whitespace-nowrap">Capture New Gesture</span>
        </button>
    </div>

    <!-- Scripts -->
    <script src="gesture_logic.js"></script>

</body>

</html>
